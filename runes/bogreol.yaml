      <nav>
        <button data-view="lib" class="on"><span class="i">📚</span>Bibliotek</button>
        <button data-view="add"><span class="i">➕</span>Tilføj</button>
        <button data-view="stats"><span class="i">📈</span>Statistik</button>
        <button data-view="more"><span class="i">⚙️</span>Mere</button>
      </nav>

      <div id="toast"></div>
      <script>
      'use strict';
      /* ================= Min Bogreol ================= */

      const LIB_QR = ['libs/html5-qrcode.min.js', 'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js'];
      const LIB_TESS = ['https://cdn.jsdelivr.net/npm/tesseract.js@7.0.0/dist/tesseract.min.js'];

      let books = [];
      let me = null;
      let chipSel = 'all';
      let pendingPhotoCover = '';

      /* ---------- helpers ---------- */
      const $ = id => document.getElementById(id);
      const uuid = () => (crypto.randomUUID ? crypto.randomUUID() :
        'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 3 | 8)).toString(16);
        }));
      const nowIso = () => new Date().toISOString();
      const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const norm = s => String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9æøå]/g, '');
      const ts = x => { const t = Date.parse(x || ''); return isNaN(t) ? 0 : t; };
      const normIsbn = s => {
        const d = String(s || '').replace(/[^0-9Xx]/g, '').toUpperCase();
        return (d.length === 13 && (d.startsWith('978') || d.startsWith('979'))) || d.length === 10 ? d : null;
      };
      const lastName = a => { const p = String(a || '').trim().split(/\s+/); return p.length ? p[p.length - 1].toLowerCase() : ''; };
      async function fetchJson(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }
      function toast(msg, ms) {
        const t = $('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove('show'), ms || 2600);
      }
      const scriptCache = {};
      function injectScript(urls) {
        const key = urls[0];
        if (scriptCache[key]) return scriptCache[key];
        scriptCache[key] = new Promise((resolve, reject) => {
          const tryNext = i => {
            if (i >= urls.length) { delete scriptCache[key]; return reject(new Error('Kunne ikke hente ' + key)); }
            const s = document.createElement('script');
            s.src = urls[i];
            s.onload = () => resolve();
            s.onerror = () => { s.remove(); tryNext(i + 1); };
            document.head.appendChild(s);
          };
          tryNext(0);
        });
        return scriptCache[key];
      }

      /* ---------- server-API ---------- */
      async function api(path, body, method) {
        const opts = {
          method: method || (body !== undefined ? 'POST' : 'GET'),
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin'
        };
        if (body !== undefined && opts.method !== 'GET') opts.body = JSON.stringify(body);
        const r = await fetch(path, opts);
        let data = {};
        try { data = await r.json(); } catch (e) {}
        if (r.status === 401 && !path.startsWith('/api/login') && !path.startsWith('/api/webauthn/login') && path !== '/api/password') {
          showLogin();
          throw new Error(data.error || 'Ikke logget ind');
        }
        if (!r.ok) throw new Error(data.error || 'Serverfejl (' + r.status + ')');
        return data;
      }
      function pushBook(b) {
        api('/api/books', { book: b }).catch(e => toast('⚠️ Kunne ikke gemme på serveren: ' + e.message));
      }
      const alive = () => books.filter(b => !b.deleted);
      const findByIsbn = isbn => { const n = normIsbn(isbn); return n ? alive().find(b => normIsbn(b.isbn) === n) : null; };
      const findByTitleAuthor = (t, a) => {
        const nt = norm(t); if (!nt) return null;
        const na = norm((a || [])[0] || '');
        return alive().find(b => norm(b.title) === nt && (!na || norm((b.authors || [])[0] || '') === na));
      };
      function markDirty() { renderAll(); }
      function addBook(data) {
        const b = Object.assign({
          id: uuid(), isbn: '', title: '', authors: [], cover: '', series: '', seriesNo: '',
          owned: false, format: 'fysisk', read: false, readYear: null, wishlist: false,
          rating: 0, notes: '', addedAt: nowIso(), updatedAt: nowIso(), deleted: false
        }, data);
        books.push(b);
        markDirty();
        pushBook(b);
        return b;
      }
      function updateBook(id, patch) {
        const b = books.find(x => x.id === id);
        if (!b) return null;
        Object.assign(b, patch, { updatedAt: nowIso() });
        markDirty();
        pushBook(b);
        return b;
      }

      /* ---------- navigation ---------- */
      function showView(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
        document.querySelectorAll('nav button').forEach(b => b.classList.toggle('on', b.dataset.view === name));
        if (name !== 'add') { stopScan(); }
        if (name === 'add') { showAddSub('menu'); }
        if (name === 'stats') { renderStats(); }
        window.scrollTo(0, 0);
      }
      document.querySelectorAll('nav button').forEach(b => b.addEventListener('click', () => showView(b.dataset.view)));

      function showAddSub(which) {
        ['addMenu', 'scanBox', 'photoBox', 'searchBox', 'existsBox', 'addForm'].forEach(id => {
          $(id).style.display = 'none';
        });
        const map = { menu: 'addMenu', scan: 'scanBox', photo: 'photoBox', search: 'searchBox', exists: 'existsBox', form: 'addForm' };
        $(map[which]).style.display = 'block';
        if (which !== 'scan') stopScan();
      }

      /* ---------- chips / list ---------- */
      const CHIPS = [
        { id: 'all', label: 'Alle', f: b => true },
        { id: 'owned', label: 'Ejet', f: b => b.owned },
        { id: 'read', label: 'Læst', f: b => b.read },
        { id: 'unread', label: 'Ulæst (ejet)', f: b => b.owned && !b.read },
        { id: 'readnotowned', label: 'Læst · ikke købt', f: b => b.read && !b.owned },
        { id: 'wish', label: 'Ønskeliste', f: b => b.wishlist },
        { id: 'fysisk', label: '📖 Hardcopy', f: b => b.owned && b.format === 'fysisk' }
      ];
      function renderChips() {
        const arr = alive();
        $('chips').innerHTML = CHIPS.map(c =>
          `<button class="chip${chipSel === c.id ? ' on' : ''}" data-chip="${c.id}">${c.label} <span class="n">${arr.filter(c.f).length}</span></button>`
        ).join('');
      }
      $('chips').addEventListener('click', e => {
        const btn = e.target.closest('[data-chip]');
        if (!btn) return;
        chipSel = btn.dataset.chip;
        renderChips(); renderList();
      });
      $('q').addEventListener('input', renderList);
      $('sort').addEventListener('change', renderList);

      function coverHtml(b, cls) {
        const fallback = ['📕', '📗', '📘', '📙'][ (norm(b.title).length + (b.title||'').length) % 4 ];
        if (b.cover) return `<div class="cover ${cls || ''}"><img src="${esc(b.cover)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='${fallback}'"></div>`;
        return `<div class="cover ${cls || ''}">${fallback}</div>`;
      }
      function badgesHtml(b) {
        const fmtIcon = { fysisk: '📖 Fysisk', ebog: '📱 E-bog', lydbog: '🎧 Lydbog' };
        let h = '';
        if (b.owned) h += `<span class="badge owned">Ejet</span>`;
        if (b.owned && b.format) h += `<span class="badge fmt">${fmtIcon[b.format] || esc(b.format)}</span>`;
        if (b.read) h += `<span class="badge read">Læst${b.readYear ? ' ' + b.readYear : ''}</span>`;
        if (b.owned && !b.read) h += `<span class="badge unread">Ulæst</span>`;
        if (b.read && !b.owned) h += `<span class="badge fmt">Ikke købt</span>`;
        if (b.wishlist) h += `<span class="badge wish">♡ Ønske</span>`;
        return h;
      }
      function getFiltered() {
        const chip = CHIPS.find(c => c.id === chipSel) || CHIPS[0];
        const q = norm($('q').value);
        let arr = alive().filter(chip.f);
        if (q) arr = arr.filter(b =>
          norm(b.title).includes(q) || norm((b.authors || []).join(' ')).includes(q) ||
          norm(b.series).includes(q) || String(b.isbn || '').replace(/[^0-9Xx]/g, '').includes($('q').value.replace(/[^0-9Xx]/g, '') || ' ')
        );
        const s = $('sort').value;
        const cmp = {
          author: (a, b2) => (lastName((a.authors || [])[0]) || 'øøø').localeCompare(lastName((b2.authors || [])[0]) || 'øøø', 'da') || a.title.localeCompare(b2.title, 'da'),
          title: (a, b2) => a.title.localeCompare(b2.title, 'da'),
          added: (a, b2) => (b2.addedAt || '').localeCompare(a.addedAt || ''),
          rating: (a, b2) => (b2.rating || 0) - (a.rating || 0) || a.title.localeCompare(b2.title, 'da'),
          series: (a, b2) => (a.series || 'øøøøø').localeCompare(b2.series || 'øøøøø', 'da') || (parseFloat(a.seriesNo) || 999) - (parseFloat(b2.seriesNo) || 999) || a.title.localeCompare(b2.title, 'da')
        }[s];
        return arr.sort(cmp);
      }
      function renderList() {
        const arr = getFiltered();
        const total = alive();
        $('libCount').textContent = total.length
          ? `${total.length} bøger · ${total.filter(b => b.owned).length} ejet · ${total.filter(b => b.read).length} læst`
          : 'Dit bibliotek er tomt';
        if (!arr.length) {
          $('list').innerHTML = total.length
            ? `<div class="empty"><div class="big">🔎</div>Ingen bøger matcher din søgning/filtret.</div>`
            : `<div class="empty"><div class="big">📚</div>Velkommen! Tryk på <b>➕ Tilføj</b> for at registrere din første bog – scan stregkoden, eller indtast den selv.</div>`;
          return;
        }
        $('list').innerHTML = arr.map(b => `
          <div class="bookcard" data-id="${b.id}">
            ${coverHtml(b)}
            <div class="bmain">
              <div class="btitle">${esc(b.title)}</div>
              <div class="bauthor">${esc((b.authors || []).join(', '))}</div>
              ${b.series ? `<div class="bseries">Serie: ${esc(b.series)}${b.seriesNo ? ' #' + esc(b.seriesNo) : ''}</div>` : ''}
              ${b.rating ? `<div class="bstars">${'★'.repeat(b.rating)}${'☆'.repeat(5 - b.rating)}</div>` : ''}
              <div class="badges">${badgesHtml(b)}</div>
            </div>
          </div>`).join('');
      }
      $('list').addEventListener('click', e => {
        const card = e.target.closest('.bookcard');
        if (card) openDetail(card.dataset.id);
      });
      function renderAll() { renderChips(); renderList(); if ($('view-stats').classList.contains('active')) renderStats(); }

      /* ---------- stars input ---------- */
      function renderStars(el, value, onchange) {
        el.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
          const b = document.createElement('button');
          b.type = 'button';
          b.textContent = '★';
          b.className = i <= value ? 'on' : '';
          b.setAttribute('aria-label', i + ' stjerner');
          b.addEventListener('click', () => {
            const nv = (value === i) ? 0 : i;
            renderStars(el, nv, onchange);
            onchange(nv);
          });
          el.appendChild(b);
        }
      }

      /* ---------- add form ---------- */
      let formRating = 0;
      function openForm(prefill, editId) {
        const p = prefill || {};
        showView('add'); showAddSub('form');
        $('lookupNote').innerHTML = p._note || '';
        $('fTitle').value = p.title || '';
        $('fAuthors').value = (p.authors || []).join(', ');
        $('fIsbn').value = p.isbn || '';
        $('fSeries').value = p.series || '';
        $('fSeriesNo').value = p.seriesNo || '';
        $('fOwned').checked = !!p.owned;
        $('fFormat').value = p.format || 'fysisk';
        $('fRead').checked = !!p.read;
        $('fReadYear').value = p.readYear || '';
        $('fWish').checked = !!p.wishlist;
        $('fNotes').value = p.notes || '';
        $('fCoverUrl').value = p.cover || '';
        $('fEditId').value = editId || '';
        formRating = p.rating || 0;
        renderStars($('fStars'), formRating, v => formRating = v);
        $('formCover').innerHTML = p.cover ? `<img src="${esc(p.cover)}" alt="" onerror="this.parentNode.innerHTML='📕'">` : '📕';
        $('formSave').textContent = editId ? 'Gem ændringer' : 'Gem bog';
        delete $('addForm').dataset.dupwarned;
        syncFormRows();
      }
      function syncFormRows() {
        $('fmtRow').style.display = $('fOwned').checked ? 'flex' : 'none';
        $('yearRow').style.display = $('fRead').checked ? 'flex' : 'none';
      }
      $('fOwned').addEventListener('change', syncFormRows);
      $('fRead').addEventListener('change', () => {
        if ($('fRead').checked && !$('fReadYear').value) $('fReadYear').value = new Date().getFullYear();
        syncFormRows();
      });
      $('addForm').addEventListener('submit', e => {
        e.preventDefault();
        const editId = $('fEditId').value;
        const data = {
          title: $('fTitle').value.trim(),
          authors: $('fAuthors').value.split(',').map(s => s.trim()).filter(Boolean),
          isbn: $('fIsbn').value.trim(),
          series: $('fSeries').value.trim(),
          seriesNo: $('fSeriesNo').value.trim(),
          owned: $('fOwned').checked,
          format: $('fFormat').value,
          read: $('fRead').checked,
          readYear: $('fRead').checked ? (parseInt($('fReadYear').value, 10) || null) : null,
          wishlist: $('fWish').checked,
          rating: formRating,
          notes: $('fNotes').value.trim(),
          cover: $('fCoverUrl').value
        };
        if (!data.title) return;
        if (!editId) {
          const dup = findByIsbn(data.isbn) || findByTitleAuthor(data.title, data.authors);
          if (dup && !$('addForm').dataset.dupwarned) {
            $('addForm').dataset.dupwarned = '1';
            $('lookupNote').innerHTML = `<div class="notice warn">⚠️ <b>${esc(dup.title)}</b> ser ud til allerede at være i dit bibliotek (${dup.owned ? 'ejet' : dup.read ? 'læst' : 'på listen'}). Tryk »Gem« igen for at tilføje alligevel.</div>`;
            window.scrollTo(0, 0);
            return;
          }
          addBook(data);
          toast('📚 »' + data.title + '« er tilføjet');
        } else {
          updateBook(editId, data);
          toast('Ændringer gemt');
        }
        pendingPhotoCover = '';
        showView('lib');
      });
      $('formCancel').addEventListener('click', () => { pendingPhotoCover = ''; showAddSub('menu'); });
      $('btnManual').addEventListener('click', () => openForm({ owned: true }));

      /* ---------- ISBN lookup ---------- */
      async function lookupIsbn(isbn) {
        const out = { isbn, title: '', authors: [], cover: '', series: '', seriesNo: '' };
        try {
          const g = await fetchJson('https://www.googleapis.com/books/v1/volumes?q=isbn:' + encodeURIComponent(isbn));
          if (g.totalItems > 0 && g.items && g.items[0].volumeInfo) {
            const v = g.items[0].volumeInfo;
            out.title = v.title || '';
            if (v.subtitle && out.title && !out.title.includes(v.subtitle)) out.title += ' – ' + v.subtitle;
            out.authors = v.authors || [];
            if (v.imageLinks && (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail)) {
              out.cover = (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail).replace(/^http:/, 'https:');
            }
          }
        } catch (e) {}
        try {
          const ed = await fetchJson('https://openlibrary.org/isbn/' + encodeURIComponent(isbn) + '.json');
          if (!out.title && ed.title) out.title = ed.title;
          if (ed.series && ed.series.length) {
            let s = String(ed.series[0]);
            const m = s.match(/(.*?)[,;]?\s*(?:#|bd\.?|bind|book|no\.?|vol\.?)\s*(\d+)\s*\.?$/i);
            if (m) { out.series = m[1].trim().replace(/[;,]$/, ''); out.seriesNo = m[2]; }
            else out.series = s.replace(/\s*;\s*$/, '').trim();
          }
          if (!out.authors.length && ed.authors && ed.authors.length) {
            try {
              const a = await fetchJson('https://openlibrary.org' + ed.authors[0].key + '.json');
              if (a.name) out.authors = [a.name];
            } catch (e) {}
          }
        } catch (e) {}
        if (!out.cover) out.cover = 'https://covers.openlibrary.org/b/isbn/' + encodeURIComponent(isbn) + '-M.jpg?default=false';
        return out;
      }
      async function handleIsbn(isbn) {
        const ex = findByIsbn(isbn);
        if (ex) { showExists(ex); return; }
        openForm({ isbn, owned: true, _note: `<div class="notice info"><span class="spin"></span> Slår ISBN ${esc(isbn)} op…</div>` });
        const info = await lookupIsbn(isbn);
        if (info.title) {
          const dup = findByTitleAuthor(info.title, info.authors);
          if (dup) { showExists(dup); return; }
          openForm(Object.assign({ owned: true, _note: `<div class="notice ok">✔ Bogen blev fundet i bogdatabasen – tjek oplysningerne og gem.</div>` }, info));
        } else {
          openForm({ isbn, owned: true, cover: pendingPhotoCover, _note: `<div class="notice warn">Bogen blev ikke fundet automatisk – udfyld selv titlen og gem.</div>` });
        }
      }
      function showExists(b) {
        showView('add'); showAddSub('exists');
        const status = [
          b.owned ? '✅ Du <b>ejer</b> den' + (b.format ? ' (' + ({fysisk:'fysisk',ebog:'e-bog',lydbog:'lydbog'}[b.format]||b.format) + ')' : '') : '❌ Du ejer den ikke',
          b.read ? '✅ Du har <b>læst</b> den' + (b.readYear ? ' i ' + b.readYear : '') : '📖 Du har ikke læst den endnu',
          b.wishlist ? '♡ Den står på din ønskeliste' : ''
        ].filter(Boolean).join('<br>');
        $('existsBox').innerHTML = `
          <div class="notice ok" style="font-size:1rem"><b>Du har allerede denne bog i biblioteket! 🎉</b></div>
          <div class="bookcard" data-noclick="1">
            ${coverHtml(b)}
            <div class="bmain">
              <div class="btitle">${esc(b.title)}</div>
              <div class="bauthor">${esc((b.authors || []).join(', '))}</div>
              <div style="margin-top:8px; font-size:0.9rem">${status}</div>
            </div>
          </div>
          <button class="btn" id="exOpen">Se / redigér bogen</button>
          <button class="btn sec" id="exScan">📷 Scan en ny bog</button>
          <button class="btn sec" id="exMenu">Tilbage</button>`;
        $('exOpen').addEventListener('click', () => { showView('lib'); openDetail(b.id); });
        $('exScan').addEventListener('click', startScan);
        $('exMenu').addEventListener('click', () => showAddSub('menu'));
      }

      /* ---------- scanner ---------- */
      let scanner = null;
      $('btnScan').addEventListener('click', startScan);
      $('scanCancel').addEventListener('click', () => showAddSub('menu'));
      $('isbnManualGo').addEventListener('click', () => {
        const isbn = normIsbn($('isbnManual').value);
        if (!isbn) { toast('Det ligner ikke et gyldigt ISBN (10 eller 13 cifre)'); return; }
        $('isbnManual').value = '';
        handleIsbn(isbn);
      });
      async function startScan() {
        showAddSub('scan');
        $('reader').innerHTML = '<div class="center" style="color:#fff; padding:40px 10px"><span class="spin"></span> Starter kamera…</div>';
        try {
          await injectScript(LIB_QR);
        } catch (e) {
          $('reader').innerHTML = '<div class="center" style="color:#fff; padding:30px 10px">Kunne ikke hente scanner-modulet (tjek internetforbindelsen). Du kan stadig indtaste ISBN herunder.</div>';
          return;
        }
        try {
          $('reader').innerHTML = '';
          scanner = new Html5Qrcode('reader', {
            formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A]
          });
          await scanner.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 260, height: 140 } },
            text => {
              const isbn = normIsbn(text);
              if (!isbn) return;
              if (navigator.vibrate) navigator.vibrate(80);
              stopScan();
              handleIsbn(isbn);
            },
            () => {}
          );
        } catch (e) {
          $('reader').innerHTML = '<div class="center" style="color:#fff; padding:30px 10px">Kameraet kunne ikke startes – har du givet browseren lov til at bruge kameraet? Du kan indtaste ISBN herunder i stedet.</div>';
        }
      }
      function stopScan() {
        if (scanner) {
          const s = scanner; scanner = null;
          Promise.resolve().then(() => s.stop()).then(() => s.clear()).catch(() => {});
        }
      }

      /* ---------- text search (add) ---------- */
      $('btnSearch').addEventListener('click', () => { showAddSub('search'); $('searchResults').innerHTML = ''; $('bookQuery').value = ''; $('bookQuery').focus(); });
      $('searchCancel').addEventListener('click', () => { pendingPhotoCover = ''; showAddSub('menu'); });
      $('bookQueryGo').addEventListener('click', () => runBookSearch($('bookQuery').value));
      $('bookQuery').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); runBookSearch($('bookQuery').value); } });
      async function runBookSearch(q) {
        q = String(q || '').trim();
        if (!q) return;
        $('searchResults').innerHTML = '<div class="center" style="padding:16px"><span class="spin"></span></div>';
        let items = [];
        try {
          const g = await fetchJson('https://www.googleapis.com/books/v1/volumes?maxResults=8&q=' + encodeURIComponent(q));
          items = (g.items || []).map(it => {
            const v = it.volumeInfo || {};
            const ids = v.industryIdentifiers || [];
            const i13 = ids.find(x => x.type === 'ISBN_13'), i10 = ids.find(x => x.type === 'ISBN_10');
            return {
              title: v.title || '', authors: v.authors || [],
              isbn: (i13 && i13.identifier) || (i10 && i10.identifier) || '',
              cover: v.imageLinks ? (v.imageLinks.thumbnail || v.imageLinks.smallThumbnail || '').replace(/^http:/, 'https:') : '',
              year: (v.publishedDate || '').slice(0, 4)
            };
          }).filter(x => x.title);
        } catch (e) {}
        if (!items.length) {
          $('searchResults').innerHTML = '<div class="empty">Ingen resultater – prøv en anden søgning, eller <button class="btn small sec" id="srManual" style="border:1px solid var(--line); background:var(--card); color:var(--ink)">indtast manuelt</button></div>';
          const m = $('srManual'); if (m) m.addEventListener('click', () => openForm({ title: $('bookQuery').value, owned: true, cover: pendingPhotoCover }));
          return;
        }
        $('searchResults').innerHTML = items.map((x, i) => `
          <div class="result" data-i="${i}">
            ${x.cover ? `<div class="cover"><img src="${esc(x.cover)}" alt="" onerror="this.parentNode.innerHTML='📕'"></div>` : '<div class="cover">📕</div>'}
            <div><div class="rt">${esc(x.title)}</div><div class="ra">${esc(x.authors.join(', '))}${x.year ? ' · ' + esc(x.year) : ''}</div></div>
          </div>`).join('');
        $('searchResults').querySelectorAll('.result').forEach(el => el.addEventListener('click', () => {
          const x = items[+el.dataset.i];
          const ex = (x.isbn && findByIsbn(x.isbn)) || findByTitleAuthor(x.title, x.authors);
          if (ex) { showExists(ex); return; }
          openForm({
            title: x.title, authors: x.authors, isbn: x.isbn, cover: x.cover || pendingPhotoCover, owned: true,
            _note: '<div class="notice ok">✔ Tjek oplysningerne og gem.</div>'
          });
        }));
      }

      /* ---------- photo / OCR ---------- */
      $('btnPhoto').addEventListener('click', () => { showAddSub('photo'); $('photoInput').value = ''; $('photoInput').click(); });
      $('photoCancel').addEventListener('click', () => { pendingPhotoCover = ''; showAddSub('menu'); });
      $('photoInput').addEventListener('change', async e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        $('photoStatus').style.display = 'block';
        $('photoStatusText').textContent = 'Gør billedet klar…';
        try {
          const img = await loadImageFile(file);
          pendingPhotoCover = drawScaled(img, 300).toDataURL('image/jpeg', 0.7);
          const big = drawScaled(img, 1100);
          $('photoStatusText').textContent = 'Henter tekstgenkendelse…';
          await injectScript(LIB_TESS);
          $('photoStatusText').textContent = 'Læser teksten på forsiden…';
          const worker = await Tesseract.createWorker(['dan', 'eng']);
          const res = await worker.recognize(big);
          await worker.terminate();
          const text = (res && res.data && res.data.text) || '';
          const lines = text.split('\n').map(s => s.replace(/[^0-9A-Za-zÆØÅæøå' \-:.]/g, ' ').replace(/\s+/g, ' ').trim())
            .filter(s => s.length > 3);
          lines.sort((a, b) => b.length - a.length);
          const q = lines.slice(0, 2).join(' ').slice(0, 80);
          $('photoStatus').style.display = 'none';
          showAddSub('search');
          $('bookQuery').value = q;
          if (q) { runBookSearch(q); toast('Vælg den rigtige bog på listen – eller ret søgningen'); }
          else { toast('Kunne ikke læse teksten – søg manuelt'); }
        } catch (err) {
          $('photoStatus').style.display = 'none';
          showAddSub('search');
          toast('Billedgenkendelse fejlede – søg manuelt i stedet');
        }
      });
      function loadImageFile(file) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = url;
        });
      }
      function drawScaled(img, maxW) {
        const sc = Math.min(1, maxW / img.naturalWidth);
        const c = document.createElement('canvas');
        c.width = Math.round(img.naturalWidth * sc);
        c.height = Math.round(img.naturalHeight * sc);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        return c;
      }

      /* ---------- detail sheet ---------- */
      function openDetail(id) {
        const b = books.find(x => x.id === id && !x.deleted);
        if (!b) return;
        const sheet = $('sheet');
        sheet.innerHTML = `
          <div class="grab"></div>
          <div class="sheethead">
            ${coverHtml(b)}
            <div style="flex:1; min-width:0">
              <div class="btitle" style="font-size:1.15rem">${esc(b.title)}</div>
              <div class="bauthor">${esc((b.authors || []).join(', '))}</div>
              ${b.series ? `<div class="bseries">Serie: ${esc(b.series)}${b.seriesNo ? ' #' + esc(b.seriesNo) : ''}</div>` : ''}
              ${b.isbn ? `<div class="muted" style="font-size:0.75rem; margin-top:3px">ISBN ${esc(b.isbn)}</div>` : ''}
              <div class="badges" id="dBadges">${badgesHtml(b)}</div>
            </div>
          </div>
          <div class="panel">
            <div class="togglerow">
              <div><div class="tl">Jeg ejer bogen</div></div>
              <span class="switch"><input type="checkbox" id="dOwned" ${b.owned ? 'checked' : ''}><span class="track"></span></span>
            </div>
            <div class="togglerow" id="dFmtRow" style="${b.owned ? '' : 'display:none'}">
              <div class="tl">Format</div>
              <select id="dFormat" style="width:auto">
                <option value="fysisk" ${b.format === 'fysisk' ? 'selected' : ''}>📖 Fysisk (hardcopy)</option>
                <option value="ebog" ${b.format === 'ebog' ? 'selected' : ''}>📱 E-bog</option>
                <option value="lydbog" ${b.format === 'lydbog' ? 'selected' : ''}>🎧 Lydbog</option>
              </select>
            </div>
            <div class="togglerow">
              <div><div class="tl">Jeg har læst den</div></div>
              <span class="switch"><input type="checkbox" id="dRead" ${b.read ? 'checked' : ''}><span class="track"></span></span>
            </div>
            <div class="togglerow" id="dYearRow" style="${b.read ? '' : 'display:none'}">
              <div class="tl">Læst i år</div>
              <input type="number" id="dReadYear" style="width:100px" value="${b.readYear || ''}" min="1950" max="2100">
            </div>
            <div class="togglerow">
              <div><div class="tl">Ønskeliste</div></div>
              <span class="switch"><input type="checkbox" id="dWish" ${b.wishlist ? 'checked' : ''}><span class="track"></span></span>
            </div>
          </div>
          <label>Vurdering</label>
          <div class="starinput" id="dStars"></div>
          <label>Noter</label>
          <textarea id="dNotes" rows="3">${esc(b.notes || '')}</textarea>
          ${b.series ? `<button class="btn sec" id="dSeries">🔗 Se serien »${esc(b.series)}« – find de bøger du mangler</button><div id="dSeriesBox"></div>` : ''}
          <button class="btn sec" id="dEdit">✏️ Redigér oplysninger</button>
          <button class="btn danger" id="dDelete">Slet bogen</button>
          <button class="btn sec" id="dClose">Luk</button>`;
        $('overlay').classList.add('open');

        const refresh = () => { $('dBadges').innerHTML = badgesHtml(books.find(x => x.id === id)); };
        $('dOwned').addEventListener('change', e => {
          $('dFmtRow').style.display = e.target.checked ? 'flex' : 'none';
          updateBook(id, { owned: e.target.checked }); refresh();
        });
        $('dFormat').addEventListener('change', e => { updateBook(id, { format: e.target.value }); refresh(); });
        $('dRead').addEventListener('change', e => {
          const yr = e.target.checked ? (parseInt($('dReadYear').value, 10) || new Date().getFullYear()) : null;
          $('dYearRow').style.display = e.target.checked ? 'flex' : 'none';
          if (e.target.checked && !$('dReadYear').value) $('dReadYear').value = yr;
          updateBook(id, { read: e.target.checked, readYear: yr }); refresh();
        });
        $('dReadYear').addEventListener('change', e => updateBook(id, { readYear: parseInt(e.target.value, 10) || null }));
        $('dWish').addEventListener('change', e => { updateBook(id, { wishlist: e.target.checked }); refresh(); });
        renderStars($('dStars'), b.rating || 0, v => { updateBook(id, { rating: v }); refresh(); });
        let notesT = null;
        $('dNotes').addEventListener('input', e => {
          clearTimeout(notesT);
          notesT = setTimeout(() => updateBook(id, { notes: e.target.value.trim() }), 600);
        });
        if (b.series) $('dSeries').addEventListener('click', () => seriesExplore(b, $('dSeriesBox')));
        $('dEdit').addEventListener('click', () => { closeSheet(); openForm(b, b.id); });
        $('dDelete').addEventListener('click', e => {
          if (e.target.dataset.armed) {
            updateBook(id, { deleted: true });
            closeSheet();
            toast('Bogen er slettet');
          } else {
            e.target.dataset.armed = '1';
            e.target.textContent = 'Tryk igen for at slette permanent';
          }
        });
        $('dClose').addEventListener('click', closeSheet);
      }
      function closeSheet() { $('overlay').classList.remove('open'); }
      $('overlay').addEventListener('click', e => { if (e.target === $('overlay')) closeSheet(); });

      /* ---------- series explorer ---------- */
      const seriesCache = {};
      async function seriesExplore(book, box) {
        box.innerHTML = '<div class="center" style="padding:14px"><span class="spin"></span> Søger efter bøger i serien…</div>';
        const name = book.series;
        let docs = seriesCache[name];
        if (!docs) {
          try {
            const d = await fetchJson('https://openlibrary.org/search.json?limit=50&fields=title,author_name,first_publish_year&q=' +
              encodeURIComponent('series:"' + name + '"'));
            docs = d.docs || [];
            seriesCache[name] = docs;
          } catch (e) { docs = null; }
        }
        const gr = t => 'https://www.goodreads.com/search?q=' + encodeURIComponent(t);
        const gg = t => 'https://www.google.com/search?q=' + encodeURIComponent(t + ' bog');
        if (!docs || !docs.length) {
          box.innerHTML = `<div class="panel"><div class="muted">Kunne ikke finde serien automatisk i bogdatabasen.</div>
            <a class="btn small" style="display:inline-block; text-decoration:none; text-align:center" target="_blank" rel="noopener" href="${gr(name)}">Se serien på Goodreads ↗</a></div>`;
          return;
        }
        const seen = {};
        const uniq = [];
        docs.forEach(d => {
          const k = norm(d.title);
          if (!k || seen[k]) return;
          seen[k] = 1;
          uniq.push(d);
        });
        uniq.sort((a, b) => (a.first_publish_year || 9999) - (b.first_publish_year || 9999));
        const libIdx = {};
        alive().forEach(b => libIdx[norm(b.title)] = b);
        const rows = uniq.slice(0, 25).map(d => {
          const mine = libIdx[norm(d.title)];
          const author = (d.author_name || [])[0] || '';
          let right;
          if (mine) {
            right = badgesHtml(mine) || '<span class="badge fmt">På listen</span>';
          } else {
            right = `<a target="_blank" rel="noopener" href="${gr(d.title + ' ' + author)}">Goodreads ↗</a> <a target="_blank" rel="noopener" href="${gg(d.title + ' ' + author)}">Søg ↗</a>`;
          }
          return `<div class="serieitem">
            <div class="st">${esc(d.title)} ${d.first_publish_year ? `<span class="sy">(${d.first_publish_year})</span>` : ''}<br><span class="sy">${esc(author)}</span></div>
            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end">${right}</div>
          </div>`;
        }).join('');
        box.innerHTML = `<div class="panel"><b style="font-size:0.9rem">Serien »${esc(name)}« (${uniq.length} fundet)</b>
          <div class="muted" style="font-size:0.76rem; margin:2px 0 6px">Bøger du har, vises med mærkater – resten har links, så du kan finde dem</div>${rows}</div>`;
      }

      /* ---------- stats ---------- */
      function barRows(pairs, unit) {
        if (!pairs.length) return '<div class="muted">Ingen data endnu</div>';
        const max = Math.max(...pairs.map(p => p[1]));
        return pairs.map(p => `
          <div class="row">
            <div class="yl">${esc(p[0])}</div>
            <div class="track"><div class="fill" style="width:${Math.round(p[1] / max * 100)}%"></div></div>
            <div class="vl">${p[1]}</div>
          </div>`).join('');
      }
      function renderStats() {
        const arr = alive();
        const year = new Date().getFullYear();
        const tiles = [
          ['Ejet', arr.filter(b => b.owned).length],
          ['Læst', arr.filter(b => b.read).length],
          ['Læst i ' + year, arr.filter(b => b.read && b.readYear === year).length],
          ['Ønskeliste', arr.filter(b => b.wishlist).length]
        ];
        $('tiles').innerHTML = tiles.map(t => `<div class="tile"><div class="v">${t[1]}</div><div class="l">${t[0]}</div></div>`).join('');

        const byYear = {};
        arr.filter(b => b.read).forEach(b => {
          const k = b.readYear || 'Ukendt år';
          byYear[k] = (byYear[k] || 0) + 1;
        });
        const years = Object.entries(byYear).sort((a, b2) => String(b2[0]).localeCompare(String(a[0])));
        $('chartYears').innerHTML = barRows(years);

        const byAuthor = {};
        arr.filter(b => b.read).forEach(b => (b.authors || []).forEach(a => byAuthor[a] = (byAuthor[a] || 0) + 1));
        const authors = Object.entries(byAuthor).sort((a, b2) => b2[1] - a[1]).slice(0, 8);
        $('chartAuthors').innerHTML = authors.length ? barRows(authors) : '<div class="muted">Markér bøger som læst for at se statistikken</div>';

        const fmtName = { fysisk: '📖 Fysisk', ebog: '📱 E-bog', lydbog: '🎧 Lydbog' };
        const byFmt = {};
        arr.filter(b => b.owned).forEach(b => { const k = fmtName[b.format] || 'Andet'; byFmt[k] = (byFmt[k] || 0) + 1; });
        $('chartFormats').innerHTML = barRows(Object.entries(byFmt).sort((a, b2) => b2[1] - a[1]));
      }

      /* ---------- export / import ---------- */
      $('btnExport').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify({ app: 'bogreol', version: 1, exported: nowIso(), books }, null, 1)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'bogreol-backup-' + new Date().toISOString().slice(0, 10) + '.json';
        a.click();
        toast('Backup hentet 💾');
      });
      $('btnImport').addEventListener('click', () => $('importFile').click());
      $('importFile').addEventListener('change', e => {
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = async () => {
          try {
            const data = JSON.parse(r.result);
            const arr = Array.isArray(data) ? data : data.books;
            if (!Array.isArray(arr)) throw new Error('format');
            const resp = await api('/api/books/import', { books: arr });
            await loadBooks();
            renderAll();
            toast(`Importeret: ${resp.imported} bøger`);
          } catch (err) { toast('⚠️ Import fejlede: ' + err.message); }
        };
        r.readAsText(f);
        e.target.value = '';
      });

      /* ---------- login / konto ---------- */
      function showLogin() {
        me = null;
        document.body.classList.add('loggedout');
        document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-login'));
      }
      function showApp() {
        document.body.classList.remove('loggedout');
        showView('lib');
      }
      async function loadBooks() {
        const d = await api('/api/books');
        books = d.books || [];
      }
      async function afterLogin(m) {
        me = m;
        $('loginError').textContent = '';
        $('lPass').value = '';
        await loadBooks();
        renderAll();
        renderAccount();
        showApp();
      }
      $('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        $('loginError').textContent = '';
        try {
          const d = await api('/api/login', { username: $('lUser').value.trim(), password: $('lPass').value });
          await afterLogin(d.me);
        } catch (err) { $('loginError').textContent = err.message; }
      });
      $('showRegBtn').addEventListener('click', () => {
        const f = $('regForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
      });
      $('regForm').addEventListener('submit', async e => {
        e.preventDefault();
        $('regError').textContent = '';
        if ($('rPass').value !== $('rPass2').value) { $('regError').textContent = 'Kodeordene er ikke ens'; return; }
        try {
          const d = await api('/api/register', { username: $('rUser').value.trim(), password: $('rPass').value });
          await afterLogin(d.me);
          toast(d.firstUser ? '🎉 Velkommen! Du er oprettet som administrator.' : '🎉 Velkommen til!');
        } catch (err) { $('regError').textContent = err.message; }
      });
      $('btnLogout').addEventListener('click', async () => {
        try { await api('/api/logout', {}); } catch (e) {}
        books = [];
        showLogin();
      });

      /* ---------- WebAuthn (passkeys) ---------- */
      const bufToB64u = buf => {
        const bytes = new Uint8Array(buf);
        let s = '';
        for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
        return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      };
      const b64uToBuf = s => {
        const bin = atob(String(s).replace(/-/g, '+').replace(/_/g, '/'));
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes.buffer;
      };
      function passkeySupported() { return !!(window.PublicKeyCredential && navigator.credentials); }

      $('passkeyLoginBtn').addEventListener('click', async () => {
        $('loginError').textContent = '';
        if (!passkeySupported()) { $('loginError').textContent = 'Denne browser understøtter ikke passkeys'; return; }
        try {
          const o = await api('/api/webauthn/login/options', {});
          const pk = o.publicKey;
          pk.challenge = b64uToBuf(pk.challenge);
          pk.allowCredentials = [];
          const cred = await navigator.credentials.get({ publicKey: pk });
          const d = await api('/api/webauthn/login/verify', {
            challengeId: o.challengeId,
            id: cred.id,
            response: {
              clientDataJSON: bufToB64u(cred.response.clientDataJSON),
              authenticatorData: bufToB64u(cred.response.authenticatorData),
              signature: bufToB64u(cred.response.signature),
              userHandle: cred.response.userHandle ? bufToB64u(cred.response.userHandle) : null
            }
          });
          await afterLogin(d.me);
          toast('🔑 Logget ind med passkey');
        } catch (err) {
          if (err && err.name === 'NotAllowedError') { $('loginError').textContent = 'Passkey-login blev afbrudt'; return; }
          $('loginError').textContent = err.message || 'Passkey-login fejlede';
        }
      });
      $('pkAdd').addEventListener('click', async () => {
        $('pkError').textContent = '';
        if (!passkeySupported()) { $('pkError').textContent = 'Denne browser understøtter ikke passkeys'; return; }
        if (!window.isSecureContext) { $('pkError').textContent = 'Passkeys kræver en sikker forbindelse (https)'; return; }
        try {
          const o = await api('/api/webauthn/register/options', {});
          const pk = o.publicKey;
          pk.challenge = b64uToBuf(pk.challenge);
          pk.user.id = b64uToBuf(pk.user.id);
          pk.excludeCredentials = (pk.excludeCredentials || []).map(c => Object.assign({}, c, { id: b64uToBuf(c.id) }));
          const cred = await navigator.credentials.create({ publicKey: pk });
          const label = (navigator.userAgentData && navigator.userAgentData.platform) ||
            (/iPhone|iPad/.test(navigator.userAgent) ? 'iPhone/iPad' : /Android/.test(navigator.userAgent) ? 'Android' : 'Denne enhed');
          const d = await api('/api/webauthn/register/verify', {
            challengeId: o.challengeId,
            id: cred.id,
            label,
            response: {
              clientDataJSON: bufToB64u(cred.response.clientDataJSON),
              attestationObject: bufToB64u(cred.response.attestationObject)
            }
          });
          me = d.me;
          renderAccount();
          toast('🔑 Passkey tilføjet – du kan nu logge ind uden kodeord');
        } catch (err) {
          if (err && err.name === 'NotAllowedError') { $('pkError').textContent = 'Oprettelsen blev afbrudt'; return; }
          if (err && err.name === 'InvalidStateError') { $('pkError').textContent = 'Der findes allerede en passkey for denne enhed'; return; }
          $('pkError').textContent = err.message || 'Kunne ikke oprette passkey';
        }
      });

      /* ---------- konto-panel ---------- */
      function renderAccount() {
        if (!me) return;
        $('syncState').innerHTML = `<span class="syncdot on"></span>${esc(me.username)}`;
        $('whoAmI').innerHTML = `Logget ind som <b>${esc(me.username)}</b>${me.isAdmin ? ' · 👑 administrator' : ''}`;
        const list = me.passkeys || [];
        $('pkList').innerHTML = list.length
          ? list.map(k => `<div class="pkitem"><span>🔑 ${esc(k.label)} <span class="muted">· ${esc((k.created || '').slice(0, 10))}</span></span>
              <button class="iconbtn warn" data-pk="${esc(k.id)}">Fjern</button></div>`).join('')
          : '<div class="muted" style="padding:6px 0">Ingen passkeys endnu</div>';
        $('pkList').querySelectorAll('[data-pk]').forEach(btn => btn.addEventListener('click', async () => {
          try {
            const d = await api('/api/webauthn/credentials/' + encodeURIComponent(btn.dataset.pk), undefined, 'DELETE');
            me = d.me; renderAccount(); toast('Passkey fjernet');
          } catch (e) { toast('⚠️ ' + e.message); }
        }));
        $('adminPanel').style.display = me.isAdmin ? 'block' : 'none';
        if (me.isAdmin) renderAdmin();
      }
      $('cpSave').addEventListener('click', async () => {
        $('cpError').textContent = '';
        try {
          await api('/api/password', { current: $('cpCurrent').value, password: $('cpNew').value });
          $('cpCurrent').value = ''; $('cpNew').value = '';
          toast('Kodeordet er skiftet ✔');
        } catch (e) { $('cpError').textContent = e.message; }
      });

      /* ---------- admin-panel ---------- */
      async function renderAdmin() {
        try {
          const d = await api('/api/admin/users');
          $('admAllowReg').checked = !!d.allowRegistration;
          $('admUsers').innerHTML = d.users.map(u => `
            <div class="userrow" data-uid="${u.id}">
              <div class="grow">
                <div class="un">${u.isAdmin ? '👑 ' : ''}${esc(u.username)}${me && u.id === me.id ? ' <span class="muted">(dig)</span>' : ''}</div>
                <div class="um">${u.books} bøger · ${u.passkeys} passkeys · oprettet ${esc((u.created || '').slice(0, 10))}</div>
              </div>
              <button class="iconbtn" data-act="pw">Nyt kodeord</button>
              <button class="iconbtn" data-act="role">${u.isAdmin ? 'Fjern admin' : 'Gør til admin'}</button>
              ${me && u.id === me.id ? '' : '<button class="iconbtn warn" data-act="del">Slet</button>'}
            </div>`).join('');
          $('admUsers').querySelectorAll('.userrow').forEach(row => {
            const uid = parseInt(row.dataset.uid, 10);
            const usr = d.users.find(x => x.id === uid);
            row.querySelectorAll('[data-act]').forEach(btn => btn.addEventListener('click', async () => {
              try {
                if (btn.dataset.act === 'pw') {
                  const np = prompt(`Nyt kodeord til »${usr.username}« (mindst 8 tegn):`);
                  if (np == null) return;
                  await api(`/api/admin/users/${uid}/password`, { password: np });
                  toast(`Kodeordet for ${usr.username} er skiftet`);
                } else if (btn.dataset.act === 'role') {
                  await api(`/api/admin/users/${uid}/role`, { isAdmin: !usr.isAdmin });
                  toast(usr.isAdmin ? `${usr.username} er ikke længere admin` : `${usr.username} er nu administrator 👑`);
                } else if (btn.dataset.act === 'del') {
                  if (!btn.dataset.armed) {
                    btn.dataset.armed = '1';
                    btn.textContent = 'Sikker? Tryk igen';
                    setTimeout(() => { btn.dataset.armed = ''; btn.textContent = 'Slet'; }, 4000);
                    return;
                  }
                  await api(`/api/admin/users/${uid}`, undefined, 'DELETE');
                  toast(`Brugeren ${usr.username} er slettet`);
                }
                renderAdmin();
              } catch (e) { toast('⚠️ ' + e.message); }
            }));
          });
        } catch (e) {
          $('admUsers').innerHTML = `<div class="muted">Kunne ikke hente brugere: ${esc(e.message)}</div>`;
        }
      }
      $('admAllowReg').addEventListener('change', async e => {
        try {
          await api('/api/admin/settings', { allowRegistration: e.target.checked });
          toast(e.target.checked ? 'Registrering er åben' : 'Registrering er lukket');
        } catch (err) { toast('⚠️ ' + err.message); e.target.checked = !e.target.checked; }
      });

      /* ---------- init ---------- */
      async function init() {
        try {
          const d = await api('/api/me');
          me = d.me;
          await loadBooks();
          renderAll();
          renderAccount();
          showApp();
        } catch (e) {
          showLogin();
        }
      }
      init();
      </script>
      </body>
      </html>
